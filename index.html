<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Mehnaj 🌸</title>

<style>
body {
  margin:0;
  background:#1a0a14;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
}

/* Tap screen */
#tap-screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.tap-rose{
  font-size:60px;
}

.tap-name{
  font-size:40px;
  color:pink;
}

.tap-hint{
  opacity:0.6;
}

/* Main */
#main{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  transition:1s;
}

#main.visible{
  opacity:1;
}

/* Flower */
.flower{
  font-size:80px;
  margin-bottom:20px;
}

/* Text */
.message{
  color:pink;
  font-size:20px;
}
</style>
</head>

<body>

<!-- Tap Screen -->
<div id="tap-screen" onclick="beginExperience()">
  <div class="tap-rose">🌸</div>
  <div class="tap-name">Mehnaj</div>
  <div class="tap-hint">tap anywhere</div>
</div>

<!-- Main -->
<div id="main">
  <div class="flower">🌸</div>
  <div class="message">
    A flower for the flower… ❤️
  </div>
</div>

<script>

// 🎶 BUILT-IN MUSIC (no mp3 needed)
function startAudio() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  function play(freq, time){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(0.1, ctx.currentTime + time);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + 1);

    osc.start(ctx.currentTime + time);
    osc.stop(ctx.currentTime + time + 1);
  }

  // simple romantic melody
  play(440,0);
  play(494,0.5);
  play(523,1);
  play(494,1.5);
  play(440,2);
}

// start experience
function beginExperience(){
  startAudio();

  document.getElementById("tap-screen").style.display="none";
  document.getElementById("main").classList.add("visible");
}

</script>

</body>
</html>
