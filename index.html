<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mehnaj ❤️</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
}

/* center layout */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
}

/* intro text */
#startText{
  font-size:20px;
  color:pink;
  animation:fade 1.5s infinite alternate;
}

/* flower */
.flower{
  font-size:80px;
  opacity:0;
  transform:scale(0);
  transition:1.2s;
}

/* typing text */
#text{
  font-size:18px;
  color:pink;
  min-height:40px;
}

/* final message */
#final{
  font-size:20px;
  opacity:0;
  transition:1s;
}

/* floating hearts */
.heart{
  position:absolute;
  color:red;
  font-size:20px;
  animation:float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-800px);}
}

/* small fade animation */
@keyframes fade{
  from{opacity:0.5;}
  to{opacity:1;}
}
</style>

</head>

<body>

<div class="container">
  <p id="startText">Tap anywhere… 🌸</p>

  <div class="flower" id="flower">🌸</div>
  <p id="text"></p>
  <p id="final"></p>
</div>

<audio id="music" src="love.mp3" preload="auto" loop></audio>

<script>

document.body.addEventListener("click", startExperience, { once: true });

function startExperience(){

  // remove intro text
  document.getElementById("startText").style.display = "none";

  // play music
  let audio = document.getElementById("music");
  audio.muted = false;
  audio.play().catch(() => {});

  // show flower
  let flower = document.getElementById("flower");
  flower.style.opacity = 1;
  flower.style.transform = "scale(1.6)";

  // message list
  let messages = [
    "Hey Mehnaj...",
    "I didn’t plan this...",
    "But somehow you became special to me...",
    "So I made something small..."
  ];

  let text = document.getElementById("text");
  let index = 0;

  function showLine(){
    if(index < messages.length){
      typeText(messages[index], () => {
        index++;
        setTimeout(showLine, 900);
      });
    } else {
      showFinal();
    }
  }

  function typeText(msg, callback){
    text.innerHTML = "";
    let i = 0;
    function typing(){
      if(i < msg.length){
        text.innerHTML += msg.charAt(i);
        i++;
        setTimeout(typing, 40);
      } else {
        callback();
      }
    }
    typing();
  }

  function showFinal(){
    let final = document.getElementById("final");
    final.innerHTML = "A flower for the flower… Mehnaj ❤️";
    final.style.opacity = 1;
  }

  setTimeout(showLine, 800);

  // floating hearts
  setInterval(()=>{
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="100vh";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),4000);
  },300);
}

</script>

</body>
</html>
