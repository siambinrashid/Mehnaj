<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Mehnaj 🌸</title>

<style>
body {
  margin:0;
  background:#1a0a14;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
}

/* TAP SCREEN */
#tap-screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.tap-rose{
  font-size:70px;
  animation: pulse 2s infinite;
}

.tap-name{
  font-size:40px;
  color:pink;
}

.tap-hint{
  opacity:0.6;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.1);}
}

/* MAIN */
#main{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  transition:1s;
}

#main.visible{
  opacity:1;
}

/* FLOWER */
.flower{
  font-size:90px;
  opacity:0;
  transform:scale(0);
  transition:1s;
}

/* TEXT */
.text{
  color:pink;
  font-size:22px;
  margin-top:20px;
  opacity:0;
  transition:1s;
}

/* HEARTS */
.heart{
  position:absolute;
  color:red;
  font-size:20px;
  animation: float 4s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-800px);}
}
</style>
</head>

<body>

<!-- TAP -->
<div id="tap-screen" onclick="startExperience()">
  <div class="tap-rose">🌸</div>
  <div class="tap-name">Mehnaj</div>
  <div class="tap-hint">tap anywhere</div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="flower" id="flower">🌸</div>
  <div class="text" id="text">A flower for the flower… Mehnaj ❤️</div>
</div>

<!-- 🎶 YOUR SONG -->
<audio id="music" preload="auto" loop>
  <source src="https://docs.google.com/uc?export=download&id=1GhF0XymfNwMh-9NfuQlC-RLbv4htkXkF" type="audio/mpeg">
</audio>

<script>

function startExperience(){

  // play music
  let audio = document.getElementById("music");
  audio.play().catch(() => {});

  // hide tap screen
  let tap = document.getElementById("tap-screen");
  tap.style.display = "none";

  // show main
  let main = document.getElementById("main");
  main.classList.add("visible");

  // flower animation
  let flower = document.getElementById("flower");
  setTimeout(()=>{
    flower.style.opacity = 1;
    flower.style.transform = "scale(1.5)";
  },300);

  // text animation
  let text = document.getElementById("text");
  setTimeout(()=>{
    text.style.opacity = 1;
  },1000);

  // floating hearts
  setInterval(()=>{
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="100vh";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),4000);
  },300);
}

</script>

</body>
</html>
