<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Mehnaj 🌸</title>

<style>
body{
  margin:0;
  background:#14080f; /* deep romantic dark */
  color:#f5c2cf;
  font-family: 'Cormorant Garamond', serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* center layout */
.container{
  text-align:center;
}

/* tap text */
#tap{
  font-size:18px;
  letter-spacing:2px;
  opacity:0.6;
  animation:fade 2s infinite;
}

/* flower */
.flower{
  font-size:70px;
  margin:20px 0;
  opacity:0;
  transform:scale(0.6);
  transition:1.2s ease;
}

/* name */
.name{
  font-size:42px;
  font-style:italic;
  opacity:0;
  transition:1s;
}

/* message */
.message{
  font-size:18px;
  margin-top:10px;
  opacity:0;
  line-height:1.6;
  transition:1s;
}

/* subtle fade */
@keyframes fade{
  0%,100%{opacity:0.4}
  50%{opacity:0.9}
}
</style>
</head>

<body>

<div class="container">
  <div id="tap">tap anywhere</div>

  <div class="flower" id="flower">🌸</div>

  <div class="name" id="name">Mehnaj</div>

  <div class="message" id="msg">
    A flower for the flower.<br>
    They call it love.
  </div>
</div>

<script>

/* 🎶 ROMANTIC MUSIC */
let audioCtx;

function startAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const master = audioCtx.createGain();
  master.gain.value = 0.15;
  master.connect(audioCtx.destination);

  function note(freq, start, duration, vol=0.12){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "triangle";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(master);

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + start);
    gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + start + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + start + duration);

    osc.start(audioCtx.currentTime + start);
    osc.stop(audioCtx.currentTime + start + duration);
  }

  const melody = [
    [392,0,1.5],[440,1.6,1.2],[494,2.9,1.2],[523,4.2,2.2],
    [494,6.6,1.2],[440,7.9,1.2],[392,9.2,2.2]
  ];

  melody.forEach(([f,s,d])=>{
    note(f,s,d);
  });
}

/* ✨ EXPERIENCE */
document.body.addEventListener("click", () => {

  document.getElementById("tap").style.display="none";

  startAudio();

  let flower = document.getElementById("flower");
  let name = document.getElementById("name");
  let msg = document.getElementById("msg");

  setTimeout(()=>{
    flower.style.opacity = 1;
    flower.style.transform = "scale(1)";
  },200);

  setTimeout(()=>{
    name.style.opacity = 1;
  },800);

  setTimeout(()=>{
    msg.style.opacity = 1;
  },1400);

}, { once:true });

</script>

</body>
</html>
